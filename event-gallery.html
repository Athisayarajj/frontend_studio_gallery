<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#100c10; --surface:#1b1620; --surface-2:#241d29;
    --gold:#c9a25b; --gold-soft:#e4c98c; --cream:#f4ecd8; --dust:#8d8290;
    --line:rgba(244,236,216,0.12); --shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{ margin:0; background:var(--ink); color:var(--cream); font-family:'Manrope', sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  ::selection{ background:var(--gold); color:var(--ink); }

  #shutter{ position:fixed; inset:0; z-index:9999; background:var(--ink); clip-path:circle(85% at 50% 50%); animation:shutterClose 1.15s cubic-bezier(.7,0,.3,1) forwards; pointer-events:none; }
  @keyframes shutterClose{ 0%{clip-path:circle(120% at 50% 50%);} 60%{clip-path:circle(18% at 50% 50%);} 100%{clip-path:circle(0% at 50% 50%);} }
  @media (prefers-reduced-motion: reduce){ #shutter{ display:none; } }

  .hero{ position:relative; min-height:88vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px;
    background: radial-gradient(ellipse 60% 50% at 50% 20%, rgba(201,162,91,0.14), transparent 60%), var(--ink);
    border-bottom:1px solid var(--line); }
  .aperture{ width:64px; height:64px; border-radius:50%; border:1.5px solid var(--gold); position:relative; margin-bottom:28px; animation:irisIn 1.4s ease .3s both; }
  .aperture::before{ content:""; position:absolute; inset:14px; border-radius:50%; border:1px solid var(--gold-soft); opacity:.7; }
  @keyframes irisIn{ from{ transform:scale(.3) rotate(-40deg); opacity:0; } to{ transform:scale(1) rotate(0); opacity:1; } }
  .eyebrow{ letter-spacing:.35em; text-transform:uppercase; font-size:11px; color:var(--gold); margin:0 0 18px; font-weight:600; }
  .hero h1{ font-family:'Fraunces', serif; font-weight:500; font-size:clamp(2.4rem,6vw,4.6rem); line-height:1.05; margin:0 0 14px; animation:focusIn 1.1s ease .2s both; }
  .hero h1 em{ font-style:italic; color:var(--gold-soft); font-weight:500; }
  @keyframes focusIn{ from{filter:blur(14px); opacity:0; transform:translateY(10px);} to{filter:blur(0); opacity:1; transform:translateY(0);} }
  .hero .meta{ color:var(--dust); font-size:15px; margin:0 0 30px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .hero .meta span:not(:last-child)::after{ content:"·"; margin-left:10px; color:var(--gold); }
  .hero .note{ max-width:480px; color:var(--dust); font-size:15px; line-height:1.7; margin:0 0 34px; }
  .stat-row{ display:flex; gap:28px; align-items:center; }
  .stat{ text-align:center; }
  .stat b{ display:block; font-family:'Fraunces', serif; font-size:1.5rem; color:var(--gold-soft); font-weight:500; }
  .stat span{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--dust); }
  .stat-divider{ width:1px; height:30px; background:var(--line); }

  .toolbar{ position:sticky; top:0; z-index:40; background:rgba(16,12,16,.86); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
    padding:16px 24px; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; }
  .chip{ border:1px solid var(--line); background:transparent; color:var(--dust); padding:8px 18px; border-radius:999px; font-size:13px; font-weight:600;
    cursor:pointer; transition:all .25s ease; white-space:nowrap; }
  .chip:hover{ border-color:var(--gold); color:var(--cream); }
  .chip.active{ background:var(--gold); border-color:var(--gold); color:var(--ink); }
  .toolbar .count{ margin-left:auto; font-size:12px; color:var(--dust); padding-left:14px; }
  @media (max-width:640px){ .toolbar{ justify-content:flex-start; overflow-x:auto; } .toolbar .count{ display:none; } }

  .gallery-wrap{ padding:44px 20px 90px; max-width:1280px; margin:0 auto; }
  .gallery{ column-count:4; column-gap:14px; }
  @media (max-width:1100px){ .gallery{ column-count:3; } }
  @media (max-width:760px){ .gallery{ column-count:2; column-gap:10px; } }
  @media (max-width:460px){ .gallery{ column-count:1; } }

  .card{ break-inside:avoid; margin-bottom:14px; position:relative; border-radius:10px; overflow:hidden; cursor:zoom-in;
    background:var(--surface); border:1px solid var(--line); opacity:0; animation:cardIn .6s ease forwards; }
  .card img{ width:100%; display:block; transition:transform .5s ease; }
  .card:hover img{ transform:scale(1.04); }
  .card::after{ content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.55), transparent 45%); opacity:0; transition:opacity .3s ease; }
  .card:hover::after{ opacity:1; }
  .card .tag{ position:absolute; left:10px; bottom:10px; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--cream);
    opacity:0; transform:translateY(6px); transition:all .3s ease; font-weight:600; }
  .card:hover .tag{ opacity:1; transform:translateY(0); }
  @keyframes cardIn{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }

  .state-panel{ text-align:center; padding:80px 20px; color:var(--dust); }
  .state-panel .aperture{ margin:0 auto 20px; animation:none; }

  .lightbox{ position:fixed; inset:0; z-index:200; background:rgba(8,6,9,.96); display:none; align-items:center; justify-content:center; flex-direction:column; padding:20px; }
  .lightbox.open{ display:flex; }
  .lightbox figure{ margin:0; max-width:min(90vw,900px); max-height:76vh; display:flex; flex-direction:column; align-items:center; }
  .lightbox img{ max-width:100%; max-height:76vh; border-radius:6px; box-shadow:var(--shadow); animation:irisPop .35s ease; }
  @keyframes irisPop{ from{opacity:0; transform:scale(.94);} to{opacity:1; transform:scale(1);} }
  .lightbox figcaption{ margin-top:14px; color:var(--dust); font-size:13px; letter-spacing:.04em; }
  .lb-actions{ display:flex; gap:10px; margin-top:18px; }
  .lb-btn{ border:1px solid var(--line); background:var(--surface); color:var(--cream); padding:10px 18px; border-radius:999px; font-size:13px; font-weight:600;
    cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:all .25s ease; text-decoration:none; }
  .lb-btn:hover{ border-color:var(--gold); color:var(--gold-soft); }
  .lb-close, .lb-nav{ position:fixed; top:0; background:transparent; border:none; color:var(--cream); cursor:pointer; }
  .lb-close{ top:22px; right:26px; font-size:26px; }
  .lb-nav{ top:50%; transform:translateY(-50%); font-size:34px; padding:14px; opacity:.7; }
  .lb-nav:hover{ opacity:1; color:var(--gold); }
  .lb-prev{ left:14px; } .lb-next{ right:14px; }
  @media (max-width:640px){ .lb-nav{ font-size:26px; } }

  footer{ text-align:center; padding:36px 20px 50px; color:var(--dust); font-size:12.5px; border-top:1px solid var(--line); }
  footer .studio{ color:var(--gold-soft); font-weight:600; }
  footer a{ color:var(--dust); }
  :focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
</style>
</head>
<body>

<div id="shutter" aria-hidden="true"></div>

<header class="hero">
  <div class="aperture" aria-hidden="true"></div>
  <p class="eyebrow">Almighty Studio Gallery</p>
  <h1 id="event-title">Loading&hellip;</h1>
  <p class="meta" id="event-meta"></p>
  <p class="note" id="event-note">Fetching your photos&hellip;</p>
  <div class="stat-row">
    <div class="stat"><b id="stat-count">0</b><span>Photos</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><b id="stat-cats">0</b><span>Moments</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><b>Live</b><span>Updated today</span></div>
  </div>
</header>

<nav class="toolbar" id="toolbar" aria-label="Filter photos by moment" style="display:none;">
  <span class="count" id="visible-count"></span>
</nav>

<main class="gallery-wrap">
  <div class="gallery" id="gallery" aria-live="polite"></div>
  <div class="state-panel" id="state-panel" style="display:none;"></div>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lb-close" id="lb-close" aria-label="Close">&times;</button>
  <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous photo">&#8249;</button>
  <button class="lb-nav lb-next" id="lb-next" aria-label="Next photo">&#8250;</button>
  <figure>
    <img id="lb-img" src="" alt="">
    <figcaption id="lb-caption"></figcaption>
  </figure>
  <div class="lb-actions">
    <a class="lb-btn" id="lb-download" download><span>&#8595;</span> Download</a>
    <a class="lb-btn" id="lb-whatsapp" target="_blank" rel="noopener"><span>&#9993;</span> Share</a>
  </div>
</div>

<footer>
  Captured with love by <span class="studio">Frame &amp; Folklore Studio</span><br>
  Gallery by <a href="#">Almighty Web Solutions</a>
</footer>

<script>
/* =========================================================
   CONFIG — change this after you deploy the backend.
   The QR code (generated in the admin dashboard) points to:
     <this page's URL>?event=<slug>
   so this page reads the slug from the query string and
   fetches that event's photos from the API.
========================================================= */
const API_BASE = "https://studio-gallery-hmyk.onrender.com/api"; // e.g. https://your-api.onrender.com/api

const params = new URLSearchParams(window.location.search);
const slug = params.get("event");

const galleryEl = document.getElementById("gallery");
const toolbarEl = document.getElementById("toolbar");
const visibleCountEl = document.getElementById("visible-count");
const statePanel = document.getElementById("state-panel");

let PHOTOS = [];
let CATEGORIES = [];
let activeFilter = "All";
let filtered = [];

function showState(html){
  statePanel.innerHTML = html;
  statePanel.style.display = "block";
  galleryEl.style.display = "none";
}

async function loadGallery(){
  if(!slug){
    document.getElementById("event-title").textContent = "No gallery specified";
    document.getElementById("event-note").textContent = "This link is missing an event. Ask the studio for the correct QR code.";
    return;
  }
  try{
    const res = await fetch(`${API_BASE}/gallery/${encodeURIComponent(slug)}`);
    if(!res.ok) throw new Error("not found");
    const data = await res.json();

    document.getElementById("event-title").innerHTML = data.name;
    const metaParts = [];
    if(data.date) metaParts.push(new Date(data.date + "T00:00:00").toLocaleDateString("en-IN", { day:"numeric", month:"long", year:"numeric" }));
    if(data.venue) metaParts.push(data.venue);
    document.getElementById("event-meta").innerHTML = metaParts.map(m => `<span>${m}</span>`).join("");
    document.getElementById("event-note").textContent = "Every frame from the day is here — tap any photo to view it full-size, download it, or share it on WhatsApp.";

    PHOTOS = data.photos || [];
    CATEGORIES = [...new Set(PHOTOS.map(p => p.category))];
    document.getElementById("stat-count").textContent = PHOTOS.length;
    document.getElementById("stat-cats").textContent = CATEGORIES.length;

    if(PHOTOS.length === 0){
      showState(`<div class="aperture"></div><p>No photos have been uploaded yet — check back soon.</p>`);
      return;
    }

    toolbarEl.style.display = "flex";
    buildChips();
    renderGallery();
  }catch(err){
    document.getElementById("event-title").textContent = "Gallery not found";
    document.getElementById("event-note").textContent = "This QR code may have expired, or the event hasn't been set up yet.";
  }
}

function buildChips(){
  const chips = ["All", ...CATEGORIES];
  chips.forEach(name => {
    const btn = document.createElement("button");
    btn.className = "chip" + (name === "All" ? " active" : "");
    btn.textContent = name;
    btn.addEventListener("click", () => setFilter(name));
    toolbarEl.insertBefore(btn, visibleCountEl);
  });
}

function setFilter(name){
  activeFilter = name;
  [...toolbarEl.querySelectorAll(".chip")].forEach(c => c.classList.toggle("active", c.textContent === name));
  renderGallery();
}

function renderGallery(){
  filtered = activeFilter === "All" ? PHOTOS : PHOTOS.filter(p => p.category === activeFilter);
  galleryEl.style.display = "block";
  statePanel.style.display = "none";
  galleryEl.innerHTML = "";
  visibleCountEl.textContent = `${filtered.length} photo${filtered.length !== 1 ? "s" : ""}`;

  filtered.forEach((photo, idx) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(idx * 0.03, 0.6)}s`;
    card.innerHTML = `<img src="${photo.url}" alt="${photo.category}" loading="lazy"><span class="tag">${photo.category}</span>`;
    card.addEventListener("click", () => openLightbox(idx));
    galleryEl.appendChild(card);
  });
}

/* ---------- Lightbox ---------- */
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lb-img");
const lbCaption = document.getElementById("lb-caption");
const lbDownload = document.getElementById("lb-download");
const lbWhatsapp = document.getElementById("lb-whatsapp");
let lbIndex = 0;

function openLightbox(idx){ lbIndex = idx; paintLightbox(); lb.classList.add("open"); }
function paintLightbox(){
  const photo = filtered[lbIndex];
  lbImg.src = photo.url; lbImg.alt = photo.category;
  lbCaption.textContent = photo.category;
  lbDownload.href = photo.url;
  lbDownload.download = `${photo.category.replace(/\s+/g,"_")}_${lbIndex + 1}.jpg`;
  lbWhatsapp.href = `https://wa.me/?text=${encodeURIComponent("Check out this photo: " + photo.url)}`;
}
function closeLightbox(){ lb.classList.remove("open"); }
function nextPhoto(){ lbIndex = (lbIndex + 1) % filtered.length; paintLightbox(); }
function prevPhoto(){ lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; paintLightbox(); }

document.getElementById("lb-close").addEventListener("click", closeLightbox);
document.getElementById("lb-next").addEventListener("click", nextPhoto);
document.getElementById("lb-prev").addEventListener("click", prevPhoto);
lb.addEventListener("click", (e) => { if(e.target === lb) closeLightbox(); });
document.addEventListener("keydown", (e) => {
  if(!lb.classList.contains("open")) return;
  if(e.key === "Escape") closeLightbox();
  if(e.key === "ArrowRight") nextPhoto();
  if(e.key === "ArrowLeft") prevPhoto();
});

const shutter = document.getElementById("shutter");
shutter.addEventListener("animationend", () => shutter.remove());

loadGallery();
</script>
</body>
</html>
